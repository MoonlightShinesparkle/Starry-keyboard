<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="Starry-keyboard\config\styles\icono.ico" type="image/x-icon" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry config</title>
    <link rel="stylesheet" href="styles/ConfigStyle.css">
    <link rel="stylesheet" href="styles/BodyOrchestrator.css">

    <script src="scripts/Keycodes.js" defer></script>
</head>
<body>
    <div id="estrellas-container">
        <header>
            <h1>
                Starry keyboard configuration
            </h1>
        </header>
        <div class="root">
            <div class="table-container rootsplit">
                <table>
                    <tr>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                    </tr>
                    <tr>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                    </tr>
                    <tr>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                    </tr>
                    <tr>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                    </tr>
                    <tr>    
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>
                        <td><div><button class="btn-estilizado">A</button></div></td>   
                    </tr>
                </table> 
            </div>
            <div class="Aparador-container rootsplit">
                <h2 class="titulo">Selected button</h2>
                
                <div class="Aparador-center">
                    <div></div>
                    <div class="Aparador-wrapper">
                        <button class="flecha" onclick="mover(-1)">◀</button>
                        
                        <input type="text" id="aparador" class="Aparador" 
                        value="N/A" readonly>
                        
                        <button class="flecha" onclick="mover(1)">▶</button>
                    </div>
                    <div></div>
                </div>
                
                <!-- Tipo -->
                <div class="fila-tipo">
                    <span class="label-tipo">Type:</span>
                    <select class="combo-tipo" id="tipo">
                    <option value="key" selected>Key</option>
                    <option value="text">Text</option>
                    <option value="combo">Combo</option>
                    </select>
                </div>
                <!-- Seleccionador -->
                <!-- Configuración Key -->
                <div id="key-config" class="fila-key">
                    <span class="label-key">Key:</span>

                    <input type="text" class="input-key" maxlength="2" placeholder="00">

                    <!-- Allows to choose a key .w. -->
                    <select class="combo-key">
                    </select>
                </div>

                <!-- Configuración Text -->
                <div id="text-config" class="fila-text">
                    <span class="label-text">Text:</span>
                    <input type="text" class="input-text" placeholder="Text...">
                </div>

                <!-- Configuración Combo -->
                <div id="combo-config">
                    <span class="label-combo">Combo:</span>

                    <div class="combo-row">
                        <div id="combo-keys"></div>

                        <div class="botones-combo">
                            <button id="agregar-key" class="btn-mas">+</button>
                            <button id="quitar-key" class="btn-menos">−</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            [Load btn] [Save btn]
        </footer>
    </div>
    <script src="scripts/StarGen.js"></script>
</body>
</html>
